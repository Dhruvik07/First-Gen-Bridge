services:
  postgres:
    image: postgres:16-alpine
    container_name: firstbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: firstbridge
      POSTGRES_USER: firstbridge
      POSTGRES_PASSWORD: firstbridge_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/lib/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/lib/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firstbridge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: firstbridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
